name: Deploy Laravel Blue-Green

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.AWS_PORT }}

          script: |
            set -e

            APP_DIR=/var/www/laravel-app

            echo "🔍 Detect current live version..."
            CURRENT=$(basename "$(readlink -f $APP_DIR/current || echo "")")

            if [[ "$CURRENT" == "blue" ]]; then
              TARGET="green"
            else
              TARGET="blue"
            fi

            echo "🚀 Deploying to: $TARGET"

            cd $APP_DIR/$TARGET

            echo "📥 Sync latest code (clean reset)"
            git fetch origin main
            git reset --hard origin/main

            echo "📦 Install PHP dependencies"
            composer install --no-dev --optimize-autoloader

            echo "📦 Install Node dependencies + build assets"
            npm install
            npm run build

            echo "🔗 Link shared files"

            ln -sfn $APP_DIR/shared/.env $APP_DIR/$TARGET/.env
            ln -sfn $APP_DIR/shared/storage $APP_DIR/$TARGET/storage
            ln -sfn $APP_DIR/shared/bootstrap/cache $APP_DIR/$TARGET/bootstrap/cache

            echo "🧹 Laravel optimization"
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache

            echo "🔁 Switch live symlink (zero downtime)"
            ln -sfn $APP_DIR/$TARGET $APP_DIR/current

            echo "🗄 Run migrations safely"
            # php artisan migrate --force

            echo "♻ Reload nginx"
            sudo systemctl reload nginx

            echo "✅ Deployment successful: $TARGET is LIVE"
