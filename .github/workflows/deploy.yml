name: Deploy Laravel Blue-Green

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.AWS_PORT }}

          script: |

            set -e

            APP_DIR=/var/www/laravel-app
            CURRENT=$(readlink $APP_DIR/current)

            echo "🔍 Current live: $CURRENT"

            # Decide inactive environment
            if [[ "$CURRENT" == *"blue"* ]]; then
              TARGET="green"
            else
              TARGET="blue"
            fi

            echo "🚀 Deploying to: $TARGET"

            cd $APP_DIR/$TARGET

            echo "📥 Pull latest code"
            git pull origin main

            echo "📦 Install dependencies"
            composer install --no-dev --optimize-autoloader
            npm install
            npm run build

            echo "🧹 Clear cache"
            php artisan optimize:clear

            echo "🗄 Run migrations"
            php artisan migrate --force

            echo "🔁 Switch live symlink"
            ln -sfn $APP_DIR/$TARGET $APP_DIR/current

            echo "♻ Reload nginx"
            sudo systemctl reload nginx

            echo "✅ Deployment complete: $TARGET is LIVE"